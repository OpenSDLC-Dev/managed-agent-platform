# Local development stack: the three server processes (controlplane + brain +
# executor) against a Postgres, a MinIO (object storage for skill archives),
# and an OpenBao (transit cipher for vault credential material,
# docs/plan/12_vaults-credentials.md), with an optional Jaeger for traces.
# This is the
# compose companion to deploy/helm — the same binaries, wired for a laptop.
# Quick start and configuration: see deploy/compose/README.md.
#
# The BYOC worker is intentionally excluded — it runs on your own compute, not here.

name: managed-agent-platform

# Shared build + wiring for the three app services; each overrides `command`.
x-app: &app
  build:
    context: ../..
    dockerfile: Dockerfile
  image: managed-agent-platform:local
  environment: &app-env
    # POSTGRES_PASSWORD is embedded in this DSN, so keep it URL-safe (no @ : / ? # % or spaces).
    DATABASE_URL: postgres://map:${POSTGRES_PASSWORD:-map}@postgres:5432/managed_agent_platform?sslmode=disable
    OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-false}
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: map
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-map}
      POSTGRES_DB: managed_agent_platform
    # Every binary auto-applies migrations on connect (advisory-locked), so no
    # separate migrate step; the app services just wait for Postgres to be ready.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U map -d managed_agent_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    # Object storage for the skills registry (docs/plan/06_skills.md): skill
    # archives live here, not in Postgres. The controlplane consumes it via
    # the BLOB_* env below. Same pinned release as the helm default and the
    # blobtest contract harness.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-map}
      # MinIO requires a root password of at least 8 characters.
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-map-blob-dev}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - miniodata:/data

  openbao:
    # Transit cipher for vault credential material (docs/plan/12, D1/D2):
    # ciphertext stays in Postgres, this holds only the transit key. Same
    # pinned release as the helm default and the secretstest contract harness.
    # Persistent file storage + a static (KMS-free) auto-unseal whose key
    # comes from the environment — dev-grade defaults, like the MinIO
    # password above; production points externalOpenBao / BAO_ADDR at a
    # managed instance instead.
    image: openbao/openbao:2.6.1
    command: server
    cap_add:
      - IPC_LOCK
    environment:
      # 32 bytes, base64. The committed default is a well-known dev value —
      # rotate via .env for anything beyond a laptop.
      BAO_STATIC_KEY: ${BAO_STATIC_KEY:-bWFwLW9wZW5iYW8tZGV2LXN0YXRpYy1zZWFsLWtleSE=}
      BAO_LOCAL_CONFIG: >-
        {"storage":{"file":{"path":"/openbao/file"}},
         "listener":[{"tcp":{"address":"0.0.0.0:8200","tls_disable":true}}],
         "seal":{"static":{"current_key_id":"dev-1","current_key":"env://BAO_STATIC_KEY"}}}
    healthcheck:
      # 200 whatever the init/seal state: openbao-init (below) handles the
      # one-time initialization once the listener answers.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8200/v1/sys/health?uninitcode=200&sealedcode=200&standbyok=true"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - baodata:/openbao/file

  openbao-init:
    # One-shot: initializes the bundled OpenBao on first boot (root token and
    # recovery keys land on the baoinit volume — dev-grade convenience, the
    # documented trade-off of a self-unsealing local stack), then idempotently
    # ensures the transit engine and the deterministic platform token the app
    # services authenticate with. Re-runs on every `compose up` to renew the
    # periodic token.
    image: openbao/openbao:2.6.1
    restart: "no"
    # Root only to own the baoinit volume (the image's default user cannot
    # write a fresh named volume); the server container keeps its own user.
    user: "0:0"
    depends_on:
      openbao:
        condition: service_healthy
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_PLATFORM_TOKEN: ${BAO_PLATFORM_TOKEN:-map-bao-dev-token}
      # The init policy is scoped to exactly this key — keep it in lockstep
      # with the app services' BAO_TRANSIT_KEY below.
      BAO_TRANSIT_KEY: ${BAO_TRANSIT_KEY:-map-secrets}
    entrypoint: ["/bin/sh", "/init/openbao-init.sh"]
    volumes:
      - ./openbao-init.sh:/init/openbao-init.sh:ro
      - baoinit:/openbao/init

  controlplane:
    <<: *app
    command: /controlplane
    environment:
      <<: *app-env
      CONTROLPLANE_API_KEY: ${CONTROLPLANE_API_KEY:?set CONTROLPLANE_API_KEY in .env}
      CONTROLPLANE_ADDR: ":8080"
      # Skill archives go to the bundled MinIO (plain HTTP inside the network).
      BLOB_ENDPOINT: minio:9000
      BLOB_ACCESS_KEY: ${MINIO_ROOT_USER:-map}
      BLOB_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-map-blob-dev}
      BLOB_BUCKET: map-blob
      BLOB_TLS: "false"
      # Vault credential material is encrypted through the bundled OpenBao's
      # transit engine; the token is the deterministic one openbao-init mints.
      SECRETS_BACKEND: openbao
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_PLATFORM_TOKEN:-map-bao-dev-token}
      BAO_TRANSIT_KEY: ${BAO_TRANSIT_KEY:-map-secrets}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      openbao-init:
        condition: service_completed_successfully
    ports:
      # Bound to loopback by default: the committed CONTROLPLANE_API_KEY is a
      # well-known placeholder, so the API must not be reachable from the LAN.
      # Set CONTROLPLANE_BIND=0.0.0.0 (with a real key) to expose it deliberately.
      - "${CONTROLPLANE_BIND:-127.0.0.1}:${CONTROLPLANE_PORT:-8080}:8080"

  brain:
    <<: *app
    command: /brain
    environment:
      <<: *app-env
      MODEL_PROVIDERS_PATH: /etc/map/model-providers.json
    volumes:
      # The brain's model routing (a JSON array — see internal/provider LoadRoutes).
      # Defaults to the committed example so the stack comes up out of the box;
      # set MODEL_PROVIDERS_FILE=model-providers.json (after copying + editing it)
      # to point at a real endpoint. Referencing an always-present file avoids
      # Docker silently creating a directory when the source is missing.
      - ./${MODEL_PROVIDERS_FILE:-model-providers.example.json}:/etc/map/model-providers.json:ro

  executor:
    <<: *app
    command: /executor
    environment:
      <<: *app-env
      SANDBOX_BACKEND: docker
      DOCKER_HOST: unix:///var/run/docker.sock
      # Base image for the per-session sandbox containers the executor launches.
      EXECUTOR_IMAGE: ${EXECUTOR_IMAGE:-debian:stable-slim}
      # Skill archives come from the same bundled MinIO the controlplane
      # writes; unset BLOB_ENDPOINT and the executor skips materialization.
      BLOB_ENDPOINT: minio:9000
      BLOB_ACCESS_KEY: ${MINIO_ROOT_USER:-map}
      BLOB_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-map-blob-dev}
      BLOB_BUCKET: map-blob
      BLOB_TLS: "false"
      # Same cipher wiring as the controlplane: slice 4's egress substitution
      # decrypts here (docs/plan/12).
      SECRETS_BACKEND: openbao
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_PLATFORM_TOKEN:-map-bao-dev-token}
      BAO_TRANSIT_KEY: ${BAO_TRANSIT_KEY:-map-secrets}
    # An explicit depends_on replaces the anchor's, so postgres is restated.
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      openbao-init:
        condition: service_completed_successfully
    volumes:
      # The docker sandbox backend drives the host daemon to run sibling sandbox
      # containers. Local-dev convenience; the production path uses the k8s backend.
      - /var/run/docker.sock:/var/run/docker.sock

  jaeger:
    image: jaegertracing/all-in-one:1.60
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP/gRPC (point OTEL_EXPORTER_OTLP_ENDPOINT at jaeger:4317)

volumes:
  pgdata:
  miniodata:
  baodata:
  baoinit:
