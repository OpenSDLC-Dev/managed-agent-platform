{{- if and .Values.existingSecret .Values.postgresql.enabled -}}
{{- fail "existingSecret is incompatible with postgresql.enabled: bring your own database (set postgresql.enabled=false) when managing the Secret yourself." -}}
{{- end -}}
{{- if not .Values.existingSecret -}}
{{- if not .Values.controlplane.apiKey -}}
{{- fail "controlplane.apiKey is required (or set existingSecret to reference a pre-created Secret)." -}}
{{- end -}}
{{- if not .Values.brain.modelProviders -}}
{{- fail "brain.modelProviders is required (or set existingSecret): provide at least one model route (a JSON array — see values.yaml)." -}}
{{- end -}}
{{/*
Resolve the Postgres password. It is required (not auto-generated): a generated
password is unstable under `helm template`/GitOps, where `lookup` can't read the
cluster and each render would emit a different value, so the apps' DSN would drift
from the initdb'd password and crash-loop. It is also embedded verbatim in the DSN
below, so it must be URL-safe.
*/}}
{{- $pgPassword := "" -}}
{{- if .Values.postgresql.enabled -}}
  {{- if not .Values.postgresql.password -}}
  {{- fail "postgresql.password is required when postgresql.enabled is true — the chart does not auto-generate it (a generated password is unstable under `helm template`/GitOps). Set a URL-safe value." -}}
  {{- end -}}
  {{- if regexMatch "[@:/?#% ]" .Values.postgresql.password -}}
  {{- fail "postgresql.password must be URL-safe: it is embedded in DATABASE_URL, so it may not contain @ : / ? # % or spaces. Choose a different password or percent-encode it and pass the encoded DSN via externalDatabase.url instead." -}}
  {{- end -}}
  {{- $pgPassword = .Values.postgresql.password -}}
{{- end -}}
{{/* Resolve the DSN ONCE: computed from the internal Postgres, or the external URL. */}}
{{- $dsn := "" -}}
{{- if .Values.postgresql.enabled -}}
  {{- $dsn = printf "postgres://%s:%s@%s-postgres:5432/%s?sslmode=disable" .Values.postgresql.username $pgPassword (include "map.fullname" .) .Values.postgresql.database -}}
{{- else -}}
  {{- if not .Values.externalDatabase.url -}}
  {{- fail "externalDatabase.url is required when postgresql.enabled is false (or set existingSecret)." -}}
  {{- end -}}
  {{- $dsn = .Values.externalDatabase.url -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "map.fullname" . }}
  labels:
    {{- include "map.labels" . | nindent 4 }}
type: Opaque
data:
  controlplane-api-key: {{ .Values.controlplane.apiKey | b64enc | quote }}
  model-providers.json: {{ .Values.brain.modelProviders | toJson | b64enc | quote }}
  database-url: {{ $dsn | b64enc | quote }}
  {{- if .Values.postgresql.enabled }}
  postgres-password: {{ $pgPassword | b64enc | quote }}
  {{- end }}
{{- end -}}
