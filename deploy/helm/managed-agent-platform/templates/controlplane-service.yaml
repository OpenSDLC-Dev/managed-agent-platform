apiVersion: v1
kind: Service
metadata:
  name: {{ include "map.fullname" . }}-controlplane
  labels:
    {{- include "map.labels" . | nindent 4 }}
    app.kubernetes.io/component: controlplane
spec:
  type: {{ .Values.controlplane.service.type }}
  selector:
    {{- include "map.selectorLabels" (dict "ctx" . "component" "controlplane") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.controlplane.service.port }}
      targetPort: http
      protocol: TCP
