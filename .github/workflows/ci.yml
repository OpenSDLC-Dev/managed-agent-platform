name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Build + lint: fast checks with no database dependency.
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      # The BYOC worker is meant to cross-compile; 32-bit-only breakage
      # (e.g. an untyped 64-bit const) is invisible to the host build.
      - run: GOOS=linux GOARCH=arm go build ./internal/...
      - run: go vet ./...
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

  # Helm chart: lint + render, and assert the rendered brain config is the exact
  # shape its consumer requires. The brain's LoadRoutes wants a JSON array of route
  # objects; a chart that renders the wrong shape crash-loops the brain at deploy
  # time, which unit tests can't see — so this check renders and validates it.
  helm:
    name: helm
    runs-on: ubuntu-latest
    env:
      CHART: deploy/helm/managed-agent-platform
      VALUES: deploy/helm/managed-agent-platform/ci/example-values.yaml
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint "$CHART" -f "$VALUES"
      - name: helm template renders (smoke)
        run: helm template t "$CHART" -f "$VALUES" > /dev/null
      - name: brain model-providers file is the JSON array the loader requires
        run: |
          mp="$(helm template t "$CHART" -f "$VALUES" --show-only templates/secret.yaml \
            | grep 'model-providers.json:' | awk '{print $2}' | tr -d '"' | base64 -d)"
          echo "$mp" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert isinstance(d, list) and d and all("model" in e for e in d), "model-providers.json must be a non-empty JSON array of route objects"; print("ok:", len(d), "route(s)")'
      - name: external-database path renders
        run: |
          helm template t "$CHART" -f "$VALUES" \
            --set postgresql.enabled=false \
            --set externalDatabase.url='postgres://u:p@db.example:5432/x?sslmode=require' > /dev/null
      - name: existingSecret path renders (chart creates no Secret)
        run: |
          out="$(helm template t "$CHART" -f "$VALUES" \
            --set postgresql.enabled=false --set existingSecret=my-preexisting)"
          echo "$out" | grep -q 'name: my-preexisting' || { echo "expected Deployments to reference existingSecret" >&2; exit 1; }
          echo "$out" | grep -q '^kind: Secret' && { echo "chart must not create a Secret when existingSecret is set" >&2; exit 1; }
          echo "ok: existingSecret path"
      - name: required-value guard fires (missing controlplane.apiKey)
        run: |
          if helm template t "$CHART" --set image.tag=x \
               --set-json 'brain.modelProviders=[{"model":"*"}]' > /dev/null 2>&1; then
            echo "expected the missing-apiKey guard to fail the render" >&2; exit 1
          fi
          echo "ok: guard fired"

  # Tests + the coverage gate as a distinct named check, so PRs show
  # "coverage" pass/fail on its own and the summary carries the numbers.
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The Kubernetes sandbox backend's contract test runs against a real
      # cluster (a missing cluster is a hard failure, not a skip, like the Docker
      # daemon). kind-action installs kind and sets the current kubeconfig
      # context, which the test picks up by default; its pods pull their images
      # from the runner's network.
      - name: create kind cluster (k8s sandbox contract test)
        uses: helm/kind-action@v1
        with:
          cluster_name: map-ci
      - name: test (-count=1) with coverage profile
        run: |
          # Logic packages only. internal/pgtest and internal/sandbox/sandboxtest
          # are test support — packages solely because a test in another package
          # must import them. Their uncovered statements are the assertion
          # branches that run only when a suite fails, so counting them measures
          # nothing and dilutes the gate, exactly as cmd/ main glue would.
          coverpkg="$(go list ./internal/... | grep -vE '/(pgtest|sandboxtest)$' | paste -sd, -)"
          go test -count=1 -coverpkg="$coverpkg" -coverprofile=coverage.out ./...
      - name: coverage gate (>= 90%)
        run: |
          # Exact total from the profile: `go tool cover -func` rounds to 0.1%,
          # which would let ~89.95% pass as "90.0". Duplicate blocks (same
          # package covered by several test binaries) merge with OR semantics;
          # an empty profile fails closed.
          awk 'NR>1 { stmts[$1]=$2; if ($3>0) covered[$1]=1 }
               END {
                 for (k in stmts) { t+=stmts[k]; if (k in covered) c+=stmts[k] }
                 if (t==0) { print "no statements in coverage profile"; exit 1 }
                 pct=100*c/t
                 printf "total statement coverage: %.2f%%\n", pct
                 exit !(pct >= 90.0)
               }' coverage.out
      - name: coverage summary
        if: always()
        run: |
          [ -f coverage.out ] || exit 0
          {
            echo "### Statement coverage over \`./internal/...\` (gate: ≥ 90%)"
            echo ""
            echo "| Package | Coverage |"
            echo "|---|---|"
            awk 'NR>1 { stmts[$1]=$2; if ($3>0) covered[$1]=1 }
                 END { for (b in stmts) { pkg=b; sub(/\/[^\/]*$/,"",pkg)
                         t[pkg]+=stmts[b]; if (b in covered) c[pkg]+=stmts[b] }
                       for (p in t) printf "| %s | %.1f%% |\n", p, 100*c[p]/t[p] }' coverage.out | sort
            awk 'NR>1 { stmts[$1]=$2; if ($3>0) covered[$1]=1 }
                 END { for (b in stmts) { T+=stmts[b]; if (b in covered) C+=stmts[b] }
                       printf "| **total** | **%.2f%%** |\n", 100*C/T }' coverage.out
          } >> "$GITHUB_STEP_SUMMARY"
      - name: upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: ignore
