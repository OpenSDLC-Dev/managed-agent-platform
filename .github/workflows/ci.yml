name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Build + lint: fast checks with no database dependency.
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The gate commands live in the Makefile — the single executable source
      # (the verifier runs the same targets via `make verify`).
      - run: make build
      - run: make crossbuild
      - run: make vet
      - name: gofmt
        run: make fmt-check

  # Helm chart: lint + render, and assert the rendered brain config is the exact
  # shape its consumer requires. The brain's LoadRoutes wants a JSON array of route
  # objects; a chart that renders the wrong shape crash-loops the brain at deploy
  # time, which unit tests can't see — so this check renders and validates it.
  helm:
    name: helm
    runs-on: ubuntu-latest
    env:
      CHART: deploy/helm/managed-agent-platform
      VALUES: deploy/helm/managed-agent-platform/ci/example-values.yaml
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint "$CHART" -f "$VALUES"
      - name: helm template renders (smoke)
        run: helm template t "$CHART" -f "$VALUES" > /dev/null
      - name: brain model-providers file is the JSON array the loader requires
        run: |
          mp="$(helm template t "$CHART" -f "$VALUES" --show-only templates/secret.yaml \
            | grep 'model-providers.json:' | awk '{print $2}' | tr -d '"' | base64 -d)"
          echo "$mp" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert isinstance(d, list) and d and all("model" in e for e in d), "model-providers.json must be a non-empty JSON array of route objects"; print("ok:", len(d), "route(s)")'
      - name: external-database path renders
        run: |
          helm template t "$CHART" -f "$VALUES" \
            --set postgresql.enabled=false \
            --set externalDatabase.url='postgres://u:p@db.example:5432/x?sslmode=require' > /dev/null
      - name: existingSecret path renders (chart creates no Secret)
        run: |
          out="$(helm template t "$CHART" -f "$VALUES" \
            --set postgresql.enabled=false --set minio.enabled=false \
            --set openbao.enabled=false \
            --set existingSecret=my-preexisting)"
          echo "$out" | grep -q 'name: my-preexisting' || { echo "expected Deployments to reference existingSecret" >&2; exit 1; }
          echo "$out" | grep -q '^kind: Secret' && { echo "chart must not create a Secret when existingSecret is set" >&2; exit 1; }
          echo "ok: existingSecret path"
      - name: external-openbao and local-cipher paths render
        run: |
          helm template t "$CHART" -f "$VALUES" \
            --set openbao.enabled=false \
            --set externalOpenBao.address='https://bao.example.internal:8200' \
            --set externalOpenBao.token=ci-placeholder \
            --show-only templates/secret.yaml | grep -q 'bao-addr:' \
            || { echo "expected the external-openbao Secret keys" >&2; exit 1; }
          helm template t "$CHART" -f "$VALUES" \
            --set openbao.enabled=false \
            --set localCipher.masterKey='Y2ktcGxhY2Vob2xkZXItc3RhdGljLXNlYWwta2V5ISE=' \
            --show-only templates/secret.yaml | grep -q 'secrets-master-key:' \
            || { echo "expected the local-cipher Secret keys" >&2; exit 1; }
          if helm template t "$CHART" -f "$VALUES" \
               --set externalOpenBao.address='https://bao.example.internal:8200' \
               --set externalOpenBao.token=ci-placeholder > /dev/null 2>&1; then
            echo "expected the bundled-vs-external ambiguity guard to fail the render" >&2; exit 1
          fi
          if helm template t "$CHART" -f "$VALUES" \
               --set localCipher.masterKey='Y2ktcGxhY2Vob2xkZXItc3RhdGljLXNlYWwta2V5ISE=' > /dev/null 2>&1; then
            echo "expected the openbao-vs-localCipher ambiguity guard to fail the render" >&2; exit 1
          fi
          echo "ok: cipher paths (positive and guards)"
      - name: required-value guard fires (missing controlplane.apiKey)
        run: |
          if helm template t "$CHART" --set image.tag=x \
               --set-json 'brain.modelProviders=[{"model":"*"}]' > /dev/null 2>&1; then
            echo "expected the missing-apiKey guard to fail the render" >&2; exit 1
          fi
          echo "ok: guard fired"

  # Local dev stack: validate the compose file, build the image, and smoke-test
  # that the control plane comes up and serves (migrations + auth) and the brain
  # loads its model-providers config. The executor is left out — it wants the host
  # Docker socket, which a CI runner should not hand a build.
  compose:
    name: compose
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/compose
    steps:
      - uses: actions/checkout@v4
      - name: seed local env from the committed example
        # model-providers.json is intentionally NOT created: the brain mount
        # defaults to the committed example, so this also exercises that default.
        run: cp .env.example .env
      - name: docker compose config is valid
        run: docker compose config --quiet
      - name: build the image
        run: docker compose build controlplane
      - name: control plane serves and the brain loads its config
        run: |
          docker compose up -d postgres minio controlplane brain
          key="$(grep '^CONTROLPLANE_API_KEY=' .env | cut -d= -f2-)"
          for i in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' -H "x-api-key: $key" http://localhost:8080/v1/agents || true)"
            [ "$code" = "200" ] && { echo "control plane serving (200)"; break; }
            sleep 2
          done
          [ "$code" = "200" ] || { echo "control plane never served 200 (last: $code)" >&2; docker compose logs >&2; exit 1; }
          noauth="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/v1/agents || true)"
          [ "$noauth" = "401" ] || { echo "expected 401 without a key, got $noauth" >&2; exit 1; }
          # The brain logs "brain running" only after LoadRoutes parses the mounted
          # model-providers.json, so this catches a config-shape or image regression.
          # It boots independently of the control plane, so poll rather than grep once —
          # a slow brain would otherwise fail this spuriously right after the 200.
          brain_ok=""
          for i in $(seq 1 15); do
            docker compose logs brain 2>/dev/null | grep -q "brain running" && { brain_ok=1; break; }
            sleep 2
          done
          [ -n "$brain_ok" ] || { echo "brain did not start cleanly" >&2; docker compose logs brain >&2; exit 1; }
          echo "ok: authed 200, unauthed 401, brain loaded its config"
      # E2E-1 (docs/plan/06_skills.md): the wire-only skills round-trip against
      # the bundled MinIO — upload both forms, list, download and byte-compare,
      # and prove the delete order (skill delete 400s until versions are gone).
      - name: skills registry round-trip (E2E-1)
        run: |
          key="$(grep '^CONTROLPLANE_API_KEY=' .env | cut -d= -f2-)"
          base=http://localhost:8080/v1/skills
          workdir="$(mktemp -d)"
          mkdir -p "$workdir/demo-skill"
          printf -- '---\nname: demo-skill\ndescription: A CI fixture skill.\n---\n# Demo\n' > "$workdir/demo-skill/SKILL.md"
          (cd "$workdir" && zip -qr skill.zip demo-skill)
          created="$(curl -sf -H "x-api-key: $key" -F 'files[]=@'"$workdir"'/skill.zip' "$base")"
          id="$(echo "$created" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
          ver="$(echo "$created" | python3 -c 'import json,sys; print(json.load(sys.stdin)["latest_version"])')"
          echo "created $id version $ver"
          curl -sf -H "x-api-key: $key" "$base?source=custom" | grep -q "$id"
          curl -sf -H "x-api-key: $key" "$base/$id" > /dev/null
          # Second version via the loose path-qualified form.
          v2="$(curl -sf -H "x-api-key: $key" -F 'files[]=@'"$workdir"'/demo-skill/SKILL.md;filename=demo-skill/SKILL.md' "$base/$id/versions" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["version"])')"
          n="$(curl -sf -H "x-api-key: $key" "$base/$id/versions" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)["data"]))')"
          [ "$n" = "2" ] || { echo "expected 2 versions, got $n" >&2; exit 1; }
          # The download streams the stored archive unmodified.
          curl -sf -H "x-api-key: $key" "$base/$id/versions/$ver/content" -o "$workdir/down.zip"
          cmp "$workdir/skill.zip" "$workdir/down.zip"
          code="$(curl -s -o /dev/null -w '%{http_code}' -X DELETE -H "x-api-key: $key" "$base/$id")"
          [ "$code" = "400" ] || { echo "expected 400 deleting a skill with versions, got $code" >&2; exit 1; }
          curl -sf -X DELETE -H "x-api-key: $key" "$base/$id/versions/$ver" > /dev/null
          curl -sf -X DELETE -H "x-api-key: $key" "$base/$id/versions/$v2" > /dev/null
          curl -sf -X DELETE -H "x-api-key: $key" "$base/$id" > /dev/null
          code="$(curl -s -o /dev/null -w '%{http_code}' -H "x-api-key: $key" "$base/$id")"
          [ "$code" = "404" ] || { echo "expected 404 after delete, got $code" >&2; exit 1; }
          echo "ok: upload (zip + loose), list, download byte-compare, ordered delete"
      - name: tear down
        if: always()
        run: docker compose down -v

  # Tests + the coverage gate as a distinct named check, so PRs show
  # "coverage" pass/fail on its own and the summary carries the numbers.
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The Kubernetes sandbox backend's contract test runs against a real
      # cluster (a missing cluster is a hard failure, not a skip, like the Docker
      # daemon). kind-action installs kind and sets the current kubeconfig
      # context, which the test picks up by default; its pods pull their images
      # from the runner's network.
      - name: create kind cluster (k8s sandbox contract test)
        uses: helm/kind-action@v1
        with:
          cluster_name: map-ci
      # Both steps live in the Makefile — the single executable source of the
      # gate (denominator exclusions and the exact-percentage awk documented
      # there); the verifier runs the same targets via `make verify`.
      - name: test (-count=1) with coverage profile
        run: make test
      - name: coverage gate (>= 90%)
        run: make cover-gate
      - name: coverage summary
        if: always()
        run: |
          [ -f coverage.out ] || exit 0
          {
            echo "### Statement coverage over \`./internal/...\` (gate: ≥ 90%)"
            echo ""
            echo "| Package | Coverage |"
            echo "|---|---|"
            awk 'NR>1 { stmts[$1]=$2; if ($3>0) covered[$1]=1 }
                 END { for (b in stmts) { pkg=b; sub(/\/[^\/]*$/,"",pkg)
                         t[pkg]+=stmts[b]; if (b in covered) c[pkg]+=stmts[b] }
                       for (p in t) printf "| %s | %.1f%% |\n", p, 100*c[p]/t[p] }' coverage.out | sort
            awk 'NR>1 { stmts[$1]=$2; if ($3>0) covered[$1]=1 }
                 END { for (b in stmts) { T+=stmts[b]; if (b in covered) C+=stmts[b] }
                       printf "| **total** | **%.2f%%** |\n", 100*C/T }' coverage.out
          } >> "$GITHUB_STEP_SUMMARY"
      - name: upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: ignore
